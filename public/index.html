<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KPI Producción – Inicio</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      background: linear-gradient(135deg, #0d47a1 0%, #1565c0 40%, #1976d2 70%, #0288d1 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    .landing-card {
      background: rgba(255, 255, 255, 0.97);
      border-radius: 20px;
      padding: 3rem 3.5rem;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      max-width: 480px;
      width: 90%;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-wrapper {
      margin-bottom: 1.5rem;
    }

    .logo-wrapper img {
      max-width: 200px;
      max-height: 120px;
      object-fit: contain;
    }

    .logo-fallback {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    .logo-fallback i {
      font-size: 3.5rem;
      color: #1565c0;
    }

    .logo-fallback span {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1565c0;
      letter-spacing: 0.05em;
    }

    h1.system-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 0.3rem;
    }

    p.system-subtitle {
      color: #5a6a7e;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    .btn-enter {
      background: linear-gradient(135deg, #1565c0, #0288d1);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 0.85rem 2.8rem;
      letter-spacing: 0.03em;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s;
      box-shadow: 0 4px 18px rgba(13, 71, 161, 0.4);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
    }

    .btn-enter:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(13, 71, 161, 0.5);
      color: #fff;
      opacity: 0.95;
    }

    .btn-enter:active {
      transform: translateY(0);
      box-shadow: 0 3px 12px rgba(13, 71, 161, 0.35);
    }

    .divider {
      border: none;
      border-top: 1px solid #e0e7ef;
      margin: 2rem 0 1.5rem;
    }

    .footer-text {
      font-size: 0.78rem;
      color: #9aabbf;
    }

    /* Partículas decorativas de fondo */
    .bg-circle {
      position: fixed;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      pointer-events: none;
    }

    .bg-circle-1 {
      width: 300px;
      height: 300px;
      top: -80px;
      left: -80px;
    }

    .bg-circle-2 {
      width: 200px;
      height: 200px;
      bottom: -50px;
      right: -50px;
    }

    .bg-circle-3 {
      width: 120px;
      height: 120px;
      top: 40%;
      left: 5%;
    }

    .bg-circle-4 {
      width: 80px;
      height: 80px;
      top: 20%;
      right: 10%;
    }
  </style>
</head>

<body>

  <!-- Decoración de fondo -->
  <div class="bg-circle bg-circle-1"></div>
  <div class="bg-circle bg-circle-2"></div>
  <div class="bg-circle bg-circle-3"></div>
  <div class="bg-circle bg-circle-4"></div>

  <!-- Tarjeta principal -->
  <div class="landing-card">

    <!-- Logo -->
    <div class="logo-wrapper" id="logo-wrapper">
      <img src="logo.png" alt="Logo empresa" id="logo-img" onerror="mostrarFallback()" />
      <div class="logo-fallback" id="logo-fallback">
        <i class="bi bi-droplet-fill"></i>
        <span>KPI PRODUCCIÓN</span>
      </div>
    </div>

    <!-- Título -->
    <h1 class="system-title">Sistema de KPI de Producción</h1>
    <p class="system-subtitle">Fábrica de Aceite &mdash; Control y seguimiento de turnos</p>

    <!-- Botón principal -->
    <a href="/app.html" class="btn-enter">
      <i class="bi bi-box-arrow-in-right"></i>
      Ingresar al sistema
    </a>

    <hr class="divider" />

    <p class="footer-text">
      <i class="bi bi-shield-lock me-1"></i>
      Acceso restringido al personal autorizado
    </p>
  </div>

  <script>
    function mostrarFallback() {
      document.getElementById('logo-img').style.display = 'none';
      document.getElementById('logo-fallback').style.display = 'flex';
    }
  </script>

</body>

</html>
